# === Shared config ===
[platformio]
default_envs = GS_Control_Station

[teensy_base]
platform = teensy
framework = arduino
monitor_speed = 115200
lib_ldf_mode = chain+
lib_deps =
    jgromes/RadioLib@7.6.0
build_flags =
    -Iinclude
    -Ilib/telemetry
    -Iinclude/commands
    -Iinclude/configs
    -Iinclude/core
    -Iinclude/datastore
    -Iinclude/variant
    -Iinclude/radios
    -std=c++17
#TODO pin the versions
[teensy41_base]
board = teensy41
lib_deps =
    ${teensy_base.lib_deps}
    knolleary/PubSubClient@2.8
    ssilverman/QNEthernet
build_flags =
    ${teensy_base.build_flags}
    -DTEENSY=41

[teensy40_base]
board = teensy40
lib_deps = 
    ${teensy_base.lib_deps}
build_flags =
    ${teensy_base.build_flags}
    -DTEENSY=40


# Ground Station Radio at the Control Station
[env:GS_Control_Station]
platform = ${teensy_base.platform}
framework = ${teensy_base.framework}
monitor_speed = ${teensy_base.monitor_speed}
lib_ldf_mode = ${teensy_base.lib_ldf_mode}
board = ${teensy41_base.board}
lib_deps = ${teensy41_base.lib_deps}
build_flags =
    ${teensy41_base.build_flags}
    -DDEVICE_VARIANT_GROUNDSTATION
    -DGROUNDSTATION_LOCATION_CONTROLSTATION
    -DGS_ETHERNET_ENABLE

# Ground Station Radio at the Pad
[env:GS_Pad]
platform = ${teensy_base.platform}
framework = ${teensy_base.framework}
monitor_speed = ${teensy_base.monitor_speed}
lib_ldf_mode = ${teensy_base.lib_ldf_mode}
board = ${teensy41_base.board}
lib_deps = ${teensy41_base.lib_deps}
build_flags =
    ${teensy41_base.build_flags}
    -DDEVICE_VARIANT_GROUNDSTATION
    -DGROUNDSTATION_LOCATION_PAD
    -DGS_ETHERNET_ENABLE

# Ground Station Radio without ethernet
[env:GS_NO_ETH]
platform = ${teensy_base.platform}
framework = ${teensy_base.framework}
monitor_speed = ${teensy_base.monitor_speed}
lib_ldf_mode = ${teensy_base.lib_ldf_mode}
board = ${teensy41_base.board}
lib_deps = ${teensy41_base.lib_deps}
build_flags =
    ${teensy41_base.build_flags}
    -DDEVICE_VARIANT_GROUNDSTATION
    -DGROUNDSTATION_LOCATION_CONTROLSTATION

#Flight Computer Variant, the radio pretends to be the FC 
# emits telemetry and responds to acks 
[env:FC_Mock]
platform = ${teensy_base.platform}
framework = ${teensy_base.framework}
monitor_speed = ${teensy_base.monitor_speed}
lib_ldf_mode = ${teensy_base.lib_ldf_mode}
board = ${teensy41_base.board}
lib_deps = ${teensy_base.lib_deps}
build_flags =
    ${teensy41_base.build_flags}
    -DDEVICE_VARIANT_FLIGHTCOMPUTER

#Range Test ground station variant,
#acts like the normal gs, but prints to serial data in csv
[env:RANGETEST_GS]
platform = ${teensy_base.platform}
framework = ${teensy_base.framework}
monitor_speed = ${teensy_base.monitor_speed}
lib_ldf_mode = ${teensy_base.lib_ldf_mode}
board = ${teensy41_base.board}
lib_deps = ${teensy_base.lib_deps}
build_flags =
    ${teensy41_base.build_flags}
    -DDEVICE_VARIANT_RANGETEST_GS

#Range Test
# emits telemetry and responds to acks 
[env:RANGETEST_FC]
platform = ${teensy_base.platform}
framework = ${teensy_base.framework}
monitor_speed = ${teensy_base.monitor_speed}
lib_ldf_mode = ${teensy_base.lib_ldf_mode}
board = ${teensy41_base.board}
lib_deps = ${teensy_base.lib_deps}
build_flags =
